version: '3.8'

# Base común para evitar repetir código en cada nodo (Principio DRY)
x-node-common: &node-common
  build: .
  networks:
    - cluster-net
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    interval: 5s
    timeout: 3s
    retries: 3
  # Límites estrictos para evaluar el rendimiento bajo condiciones controladas
  deploy:
    resources:
      limits:
        cpus: '0.50'
        memory: 512M

services:
  # --- Nodos del Clúster ---
  nodo1:
    <<: *node-common
    ports:
      - "8001:8000"
    environment:
      - NODE_ID=nodo1
      - NODE_PORT=8000
      - PEERS=http://nodo2:8000,http://nodo3:8000
    volumes:
      - nodo1_data:/app/data

  nodo2:
    <<: *node-common
    ports:
      - "8002:8000"
    environment:
      - NODE_ID=nodo2
      - NODE_PORT=8000
      - PEERS=http://nodo1:8000,http://nodo3:8000
    volumes:
      - nodo2_data:/app/data

  nodo3:
    <<: *node-common
    ports:
      - "8003:8000"
    environment:
      - NODE_ID=nodo3
      - NODE_PORT=8000
      - PEERS=http://nodo1:8000,http://nodo2:8000
    volumes:
      - nodo3_data:/app/data

  # --- Balanceador de Carga (Punto de Entrada) ---
  loadbalancer:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      nodo1:
        condition: service_healthy
      nodo2:
        condition: service_healthy
      nodo3:
        condition: service_healthy
    networks:
      - cluster-net

  # --- Infraestructura de Monitorización ---
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cluster-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - cluster-net

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: cluster-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - cluster-net
    depends_on:
      - cadvisor

  grafana:
    image: grafana/grafana-oss:10.4.1
    container_name: cluster-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - cluster-net
    depends_on:
      - prometheus

volumes:
  nodo1_data:
  nodo2_data:
  nodo3_data:
  prometheus_data:
  grafana_data:

networks:
  cluster-net:
    driver: bridge
