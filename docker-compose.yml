# 1. DRY (Don't Repeat Yourself): Uso de anclas (anchors) para evitar repetir código.
x-node-common: &node-common
  build: .
  networks:
    - cluster-net
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    interval: 5s
    timeout: 3s
    retries: 3
  # 2. Límites de recursos: Clave para pruebas de rendimiento controladas.
  deploy:
    resources:
      limits:
        cpus: '0.50'
        memory: 512M

services:
  # --- Nodos del Clúster ---
  nodo1:
    <<: *node-common
    environment:
      - NODE_ID=nodo1
      - NODE_PORT=8000
      - PEERS=http://nodo2:8000,http://nodo3:8000
      - API_KEY=${API_KEY:-cluster-demo-key-2026}
    volumes:
      - nodo1_data:/app/data

  nodo2:
    <<: *node-common
    environment:
      - NODE_ID=nodo2
      - NODE_PORT=8000
      - PEERS=http://nodo1:8000,http://nodo3:8000
      - API_KEY=${API_KEY:-cluster-demo-key-2026}
    volumes:
      - nodo2_data:/app/data

  nodo3:
    <<: *node-common
    environment:
      - NODE_ID=nodo3
      - NODE_PORT=8000
      - PEERS=http://nodo1:8000,http://nodo2:8000
      - API_KEY=${API_KEY:-cluster-demo-key-2026}
    volumes:
      - nodo3_data:/app/data

  # --- Balanceador de Carga (Fase 3: Alta Disponibilidad) ---
  loadbalancer:
    image: nginx:alpine
    ports:
      - "80:80"    # Redirige a HTTPS
      - "443:443"  # HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-location-common.conf:/etc/nginx/nginx-location-common.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      nodo1:
        condition: service_healthy
      nodo2:
        condition: service_healthy
      nodo3:
        condition: service_healthy
    networks:
      - cluster-net

  # --- Stack de Monitoreo (Fase 3) ---
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - cluster-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - cluster-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - cluster-net
    restart: unless-stopped

volumes:
  nodo1_data:
  nodo2_data:
  nodo3_data:
  prometheus_data:
  grafana_data:

networks:
  cluster-net:
    driver: bridge
