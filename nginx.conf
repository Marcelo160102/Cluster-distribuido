events {
    # Número máximo de conexiones simultáneas por worker
    worker_connections 1024;
}

http {
    # Definición del clúster de nodos para el balanceo de carga (Fase 3: Alta Disponibilidad)
    upstream cluster_nodos {
        # Algoritmo por defecto: Round Robin (distribuye las peticiones de manera equitativa)
        server nodo1:8000;
        server nodo2:8000;
        server nodo3:8000;
    }

    server {
        # El balanceador expone únicamente el puerto 80 al exterior
        listen 80;
        server_name localhost;

        location / {
            # Redirige todo el tráfico entrante al grupo "cluster_nodos"
            proxy_pass http://cluster_nodos;
            
            # Cabeceras de seguridad y trazabilidad para mantener la IP original del cliente
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Configuración de tolerancias (Timeouts) útiles para las pruebas de rendimiento (Fase 4)
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
    }
}
