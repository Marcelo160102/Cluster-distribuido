---
- name: Desplegar clúster distribuido
  hosts: cluster
  become: yes
  vars_files:
    - vars.yml

  tasks:
    - name: Clonar repositorio del proyecto
      git:
        repo: "{{ repo_url }}"
        dest: "{{ deploy_path }}"
        version: "{{ branch }}"
        force: yes
      register: clone_result

    - name: Crear directorios necesarios
      file:
        path: "{{ deploy_path }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - data
        - certs

    - name: Levantar el clúster con Docker Compose
      community.docker.docker_compose:
        project_src: "{{ deploy_path }}"
        build: yes
        restarted: yes
        state: present
      register: compose_result

    - name: Esperar a que los servicios estén saludables
      uri:
        url: "http://localhost:{{ cluster_port }}/health"
        method: GET
        status_code: 200
      register: health_result
      retries: 30
      delay: 2
      until: health_result.status == 200

    - name: Ejecutar smoke test
      command: bash {{ deploy_path }}/tests/smoke_test.sh http://localhost:{{ cluster_port }}
      register: smoke_result
      changed_when: false

    - name: Mostrar resultado del smoke test
      debug:
        msg: "{{ smoke_result.stdout_lines }}"

    - name: Resumen del despliegue
      debug:
        msg:
          - "Clúster desplegado en {{ ansible_host }}"
          - "LB: http://{{ ansible_host }}:{{ cluster_port }}"
          - "Prometheus: http://{{ ansible_host }}:9090"
          - "Grafana: http://{{ ansible_host }}:3000 (admin/admin)"
          - "Smoke test: {{ 'PASÓ' if smoke_result.rc == 0 else 'FALLÓ' }}"
